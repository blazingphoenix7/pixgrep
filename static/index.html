<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pixgrep</title>
<link rel="stylesheet" href="/static/style.css?v=8" />
</head>
<body>
<header>
  <h1>pix<span class="accent">grep</span></h1>
  <p class="tagline">grep for your images</p>
  <div id="user-badge" class="user-badge hidden">
    <button id="user-badge-btn" class="user-badge-btn"></button>
  </div>
  <div id="user-prompt" class="user-prompt hidden">
    <label for="user-name-input">Your name:</label>
    <input id="user-name-input" type="text" maxlength="40" placeholder="e.g. Sam" />
    <button id="user-name-save">Save</button>
  </div>
</header>

<main>
  <div class="searchbar">
    <input id="q" type="search" placeholder="Describe what you're looking for…" autofocus />
    <button id="go">Search</button>
    <span id="count" class="count"></span>
  </div>

  <div id="drop" class="drop">
    <span>…or drag &amp; drop an image here to find similar ones — or
      <button id="browse-btn" class="browse-btn" type="button">browse</button></span>
    <input id="browse-input" type="file" accept="image/*" hidden>
  </div>

  <div id="filter-toolbar" class="filter-toolbar hidden">
    <button id="filters-toggle" class="filters-toggle" aria-expanded="false">Filters ▾</button>
    <div id="active-pills" class="active-pills"></div>
  </div>
  <div id="filters" class="filters"></div>

  <div id="status" class="status"></div>
  <div id="grid" class="grid"></div>
</main>

<div id="lightbox" class="lightbox hidden">
  <div class="lightbox-inner">
    <img id="lb-img" alt="" />
    <div id="lb-filmstrip" class="filmstrip"></div>
    <div class="lightbox-meta">
      <div id="lb-name" class="lb-name"></div>
      <div id="lb-path" class="lb-path"></div>
      <div class="lb-actions">
        <button id="lb-copy">Copy path</button>
        <button id="lb-similar">More like this</button>
        <button id="lb-add-deck">Add to deck</button>
        <button id="lb-down" class="lb-down-btn hidden" title="Mark as bad result">👎</button>
        <button id="lb-close">Close</button>
      </div>
    </div>
  </div>
</div>

<div id="tray" class="tray hidden">
  <div class="tray-thumbs" id="tray-thumbs"></div>
  <div class="tray-controls">
    <span class="tray-count" id="tray-count"></span>
    <select id="tray-layout" title="Slide layout">
      <option value="1">1 per slide</option>
      <option value="4">2×2 grid</option>
    </select>
    <label class="tray-caption-label">
      <input type="checkbox" id="tray-captions" checked />
      Captions
    </label>
    <button id="tray-clear">Clear</button>
    <button id="tray-download" class="tray-primary-btn">Download PPTX</button>
    <span id="tray-msg" class="tray-msg"></span>
  </div>
</div>

<script src="/static/app.js?v=8"></script>
</body>
</html>
